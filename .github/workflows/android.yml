name: Android CI/CD (Build APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # यह स्टेप क्रैश को रोकने के लिए एक डमी debug.keystore फाइल बना देगा
    - name: Generate Dummy Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Djava.awt.headless=true"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Nexus-Mirror-APK
        path: app/build/outputs/apk/debug/app-debug.apk
