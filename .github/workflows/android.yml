name: Android CI/CD (Build APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Djava.awt.headless=true" -Dksp.incremental=false -Dkotlin.compiler.execution.strategy=daemon
